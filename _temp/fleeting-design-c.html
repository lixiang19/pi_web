<style>

  --amber: #f59e0b;
}
.dark body { background: var(--bg); color: var(--fg); }

  clip: <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/></svg>,
  trash: <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,

  sun: <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>,

  stop: <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><rect width="16" height="16" x="4" y="4" rx="2"/></svg>,
  check: <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
  filter: <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>,
};

/* ───────── Utils ───────── */
const fmtTime = (ts) => {
  const d = new Date(ts); const n = new Date();
  const m = Math.floor((n - d) / 60000);
  if (m < 1) return '刚刚';
  if (m < 60) return `${m}分钟前`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}小时前`;
  const day = Math.floor(h / 24);
  if (day < 30) return `${day}天前`;
  return `${d.getMonth() + 1}月${d.getDate()}日`;
};

const fmtSize = (b) => b < 1024 ? `${b} B` : b < 1048576 ? `${(b / 1024).toFixed(0)} KB` : `${(b / 1048576).toFixed(1)} MB`;

const STATUS_META = {
  suggested: { label: '已分析', color: '#4f46e5', bg: '#eef2ff', dot: '#4f46e5' },
  analyzing: { label: '分析中', color: '#d97706', bg: '#fffbeb', dot: '#f59e0b' },
  failed: { label: '分析失败', color: '#ef4444', bg: '#fef2f2', dot: '#ef4444' },
  unanalyzed: { label: '等待分析', color: '#94a3b8', bg: '#f8fafc', dot: '#cbd5e1' },
};

const STATUS_DARK = {
  suggested: { label: '已分析', color: '#818cf8', bg: '#1e1b4b', dot: '#6366f1' },
  analyzing: { label: '分析中', color: '#fbbf24', bg: '#451a03', dot: '#f59e0b' },
  failed: { label: '分析失败', color: '#f87171', bg: '#450a0a', dot: '#ef4444' },
  unanalyzed: { label: '等待分析', color: '#64748b', bg: '#0f172a', dot: '#475569' },
};

const RECO_LABEL = { journal: '日记', task: '任务', clip: '剪藏', milestone: '里程碑' };

const MOCK = [
  { id: '1', content: '考虑用 React Server Components 重构项目中的列表页，可以大幅减少客户端 bundle。需要评估一下对现有路由的影响。', createdAt: Date.now() - 60000, attachments: [], status: 'suggested', recoType: 'journal', recoText: '建议转为日记' },
  { id: '2', content: '灵感：Dashboard 可以加一个「今日专注度」趋势图，用热力图展示一天中哪些时段效率最高。', createdAt: Date.now() - 300000, attachments: [{ id: 'a1', name: 'sketch-trend.png', mime: 'image/png', size: 204800 }], status: 'analyzing' },
  { id: '3', content: 'https://react.dev/blog/2024/12/05/react-19 这篇文章讲 React 19 的新 API，需要读一下看看对我们的项目有没有影响。', createdAt: Date.now() - 7200000, attachments: [], status: 'suggested', recoType: 'clip', recoText: '建议转为剪藏' },
  { id: '4', content: '整理上周的会议笔记，发现有两个决定需要跟进：\n1) 数据库迁移方案\n2) 新的 API 认证流程', createdAt: Date.now() - 86400000, attachments: [
    { id: 'a2', name: 'meeting-notes.md', mime: 'text/markdown', size: 4096 },
    { id: 'a3', name: 'auth-flow.jpg', mime: 'image/jpeg', size: 512000 },
  ], status: 'suggested', recoType: 'task', recoText: '建议转为任务' },
  { id: '5', content: '文档：需要统一项目中所有的错误处理方式。目前有些地方用 throw，有些用 return Result，不一致导致维护成本高。', createdAt: Date.now() - 172800000, attachments: [], status: 'failed', lastError: 'API 超时' },
  { id: '6', content: '播客：录了一段关于类型系统和函数式编程在 TypeScript 中实践的思考，20 分钟左右。', createdAt: Date.now() - 604800000, attachments: [{ id: 'a4', name: 'recording.webm', mime: 'audio/webm', size: 3145728 }], status: 'unanalyzed' },
];

const AttIcon = ({ mime, size: s = 13 }) => {
  if (mime.startsWith('image/')) return <span style={{ color: '#8b5cf6' }}>{I.image}</span>;
  if (mime.startsWith('audio/')) return <span style={{ color: '#ec4899' }}>{I.audio}</span>;
  if (mime.includes('markdown')) return <span style={{ color: '#3b82f6' }}>{I.paper}</span>;
  return <span style={{ color: '#64748b' }}>{I.paperclip}</span>;
};

/* ───────── 主题 Context ───────── */
const ThemeCtx = React.createContext();

/* ───────── 动画 CSS ───────── */
const expandStyles = {
  overflow: 'hidden',
  transition: 'all 0.25s cubic-bezier(0.4, 0, 0.2, 1)',
};

/* ───────── 主 App ───────── */
const App = () => {
  const [dark, setDark] = useState(false);
  const theme = dark ? TDARK : T;
  useEffect(() => {
    document.documentElement.classList.toggle('dark', dark);
    document.body.style.background = theme.bg;
    document.body.style.color = theme.fg;
  }, [dark]);

  return <ThemeCtx.Provider value={theme}>
    <div style={{ height: '100vh', display: 'flex', flexDirection: 'column', background: theme.bg, color: theme.fg, position: 'relative' }}>
      <Header dark={dark} onToggleDark={() => setDark(d => !d)} />
      <Inbox />
      <CaptureBar />
    </div>
  </ThemeCtx.Provider>;
};

/* ───────── Header ───────── */
const Header = ({ dark, onToggleDark }) => {
  const T = React.useContext(ThemeCtx);
  return <div style={{
    display: 'flex', alignItems: 'center', justifyContent: 'space-between',
    padding: '18px 28px 14px',
    borderBottom: '1px solid ' + T.border,
  }}>
    <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
      <div style={{
        width: 32, height: 32, borderRadius: 10,
        background: T.primary + '14', color: T.primary,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
      }}>{I.bulb}</div>
      <div>
        <h1 style={{ fontSize: 16, fontWeight: 600, letterSpacing: '-0.01em', lineHeight: 1.3 }}>闪念</h1>
        <span style={{ fontSize: 11, color: T.muted }}>{MOCK.length} 条待处理</span>
      </div>
    </div>
    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
      <button onClick={onToggleDark} style={{
        width: 32, height: 32, borderRadius: 8, border: '1px solid ' + T.border,
        background: T.card, color: T.muted, cursor: 'pointer',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        transition: 'all 0.15s', fontSize: 13,
      }}>{dark ? I.sun : I.moon}</button>
    </div>
  </div>;
};

/* ───────── 过滤条 ───────── */
const FILTERS = [
  { key: 'all', label: '全部' },
  { key: 'processed', label: '已处理', dot: '#4f46e5' },
  { key: 'unprocessed', label: '未处理', dot: '#cbd5e1' },
];

const FilterBar = ({ active, onChange }) => {
  const T = React.useContext(ThemeCtx);
  return <div style={{
    display: 'flex', gap: 4, padding: '10px 28px 6px',
    borderBottom: '1px solid ' + T.border,
  }}>
    {FILTERS.map(f => {
      const isActive = active === f.key;
      return <button key={f.key} onClick={() => onChange(f.key)} style={{
        padding: '5px 12px', borderRadius: 8,
        border: 'none',
        background: isActive ? T.primary : 'transparent',
        color: isActive ? '#fff' : T.muted,
        fontSize: 11, fontWeight: 500, cursor: 'pointer',
        fontFamily: 'inherit',
        display: 'inline-flex', alignItems: 'center', gap: 5,
        transition: 'all 0.15s',
      }}>
        {f.dot && <span style={{ width: 5, height: 5, borderRadius: '50%', background: isActive ? '#fff' : f.dot, display: 'inline-block' }} />}
        {f.label}
      </button>;
    })}
  </div>;
};

/* ───────── Inbox ───────── */
const Inbox = () => {
  const T = React.useContext(ThemeCtx);
  const [filter, setFilter] = useState('all');
  const [expanded, setExpanded] = useState({});

  const filtered = useMemo(() => {
    if (filter === 'all') return MOCK;
    if (filter === 'processed') return MOCK.filter(n => n.status === 'suggested');
    return MOCK.filter(n => n.status !== 'suggested');
  }, [filter]);

  const toggle = (id) => {
    setExpanded(p => {
      const next = { ...p };
      if (next[id]) delete next[id]; else next[id] = true;
      return next;
    });
  };

  return <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minHeight: 0 }}>
    <FilterBar active={filter} onChange={setFilter} />
    <div style={{ flex: 1, overflowY: 'auto', padding: '12px 28px 100px' }}>
      {filtered.length === 0 ? <EmptyState /> : (
        <div style={{ position: 'relative' }}>
          {filtered.map((note, i, arr) =>
            <TimelineItem
              key={note.id}
              note={note}
              isLast={i === arr.length - 1}
              expanded={!!expanded[note.id]}
              onToggle={() => toggle(note.id)}
            />
          )}
        </div>
      )}
    </div>
  </div>;
};

/* ───────── Empty State ───────── */
const EmptyState = () => {
  const T = React.useContext(ThemeCtx);
  return <div style={{
    display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
    padding: '80px 0', gap: 16,
  }}>
    <div style={{
      width: 56, height: 56, borderRadius: 16,
      background: T.soft, color: T.muted + '60',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
    }}>{I.bulb}</div>
    <div style={{ textAlign: 'center' }}>
      <p style={{ fontSize: 14, fontWeight: 500, color: T.muted }}>没有待处理的闪念</p>
      <p style={{ fontSize: 12, color: T.muted + '80', marginTop: 4 }}>先捕捉灵感，AI 会帮你分类处理</p>
    </div>
  </div>;
};

/* ───────── Timeline Item ───────── */
const TimelineItem = ({ note, isLast, expanded, onToggle }) => {
  const T = React.useContext(ThemeCtx);
  const [hover, setHover] = useState(false);
  const st = STATUS_META[note.status];
  const isUrl = note.content.match(/^https?:\/\/\S+/);
  const hasReco = note.status === 'suggested';

  return <div
    style={{ display: 'flex', gap: 14, position: 'relative' }}
    onMouseEnter={() => setHover(true)}
    onMouseLeave={() => setHover(false)}
  >
    {/* ── 时间线列 ── */}
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', width: 20, flexShrink: 0 }}>
      <button onClick={onToggle} style={{
        width: expanded ? 14 : 12, height: expanded ? 14 : 12, borderRadius: '50%',
        marginTop: 16,
        border: expanded ? '3px solid ' + T.primary : '2.5px solid ' + (hover ? T.primary + '80' : st.dot),
        background: T.bg, cursor: 'pointer', transition: 'all 0.25s cubic-bezier(0.4, 0, 0.2, 1)',
        padding: 0, display: 'block', flexShrink: 0,
        boxSizing: 'border-box',
      }} />
      {!isLast && <div style={{
        flex: 1, width: 1,
        background: expanded ? T.primary + '30' : T.border,
        marginTop: 6, transition: 'background 0.3s',
      }} />}
    </div>

    {/* ── 内容区 ── */}
    <div style={{
      flex: 1, paddingBottom: isLast ? 0 : 8,
    }}>
      <div style={{
        borderRadius: 12,
        padding: expanded ? '14px 16px 12px' : '8px 14px 10px',
        background: expanded ? T.card : T.card,
        border: '1px solid ' + (hover ? (hasReco && !expanded ? T.primary + '40' : T.border) : (hasReco && !expanded ? T.primary + '20' : T.border)),
        boxShadow: expanded ? '0 2px 8px rgba(0,0,0,0.05)' : (hover ? '0 1px 4px rgba(0,0,0,0.04)' : '0 1px 2px rgba(0,0,0,0.02)'),
        transition: 'all 0.2s cubic-bezier(0.4, 0, 0.2, 1)',
      }}>
        {/* 折叠态：内容 + 操作 ← 直接可操作，无需展开 */}
        {!expanded && <CompactView note={note} isUrl={isUrl} st={st} hasReco={hasReco} onToggle={onToggle} />}

        {/* 展开态：全内容 */}
        {expanded && <ExpandedView note={note} isUrl={isUrl} st={st} hasReco={hasReco} />}
      </div>
    </div>
  </div>;
};

/* ───────── 折叠态·干净 + hover 操作 ───────── */
const CompactView = ({ note, isUrl, st, hasReco, onToggle }) => {
  const T = React.useContext(ThemeCtx);
  const [actHover, setActHover] = useState(false);

  return <div
    onMouseEnter={() => setActHover(true)}
    onMouseLeave={() => setActHover(false)}
    style={{ position: 'relative', cursor: 'pointer' }}
    onClick={onToggle}
  >
    {/* 内容预览 */}
    <div style={{ display: 'flex', alignItems: 'center', gap: 6, minHeight: 24 }}>
      {note.attachments.length > 0 && <span style={{ fontSize: 10, color: T.muted + '50', flexShrink: 0, display: 'inline-flex' }}>
        <AttIcon mime={note.attachments[0].mime} size={12} />
      </span>}
      {isUrl && <span style={{ color: T.primary + '60', flexShrink: 0, fontSize: 12 }}>{I.link}</span>}
      <span style={{
        fontSize: 13, lineHeight: 1.5, color: T.fg + 'e0',
        overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', flex: 1,
      }}>{note.content.replace(/https?:\/\/\S+/g, '').trim() || note.content}</span>
      <span style={{
        fontSize: 10, color: T.muted + '50', fontVariantNumeric: 'tabular-nums', flexShrink: 0,
      }}>{fmtTime(note.createdAt)}</span>
    </div>

    {/* hover 操作栏 */}
    {actHover && <div style={{
      display: 'flex', alignItems: 'center', gap: 2,
      marginTop: 4, paddingTop: 4,
      borderTop: '1px solid ' + T.border + '80',
      pointerEvents: 'auto',
    }} onClick={e => e.stopPropagation()}>
      {hasReco && <button style={smPrimary(T)}>{I.wand}<span>按建议</span></button>}
      <ActionBtn icon={I.journal} label="日记" size="sm" />
      <ActionBtn icon={I.task} label="任务" size="sm" />
      <ActionBtn icon={I.clip} label="剪藏" size="sm" />
      {note.status === 'failed' && <button style={smGhost(T)} title="重试">{I.refresh}</button>}
      <div style={{ flex: 1 }} />
      <button style={{ ...smGhost(T), color: T.danger + '60' }} title="删除">{I.trash}</button>
    </div>}
  </div>;
};

/* ───────── 展开态 ───────── */
const ExpandedView = ({ note, isUrl, st, hasReco }) => {
  const T = React.useContext(ThemeCtx);

  return <div>
    {/* 内容 */}
    {isUrl
      ? <div>
          <div style={{
            display: 'inline-flex', alignItems: 'center', gap: 4,
            fontSize: 11, color: T.primary, background: T.primaryLight,
            padding: '3px 8px', borderRadius: 6, marginBottom: 8,
          }}>{I.link} 链接</div>
          <p style={{ fontSize: 13, lineHeight: 1.6, color: T.fg, wordBreak: 'break-all' }}>{note.content}</p>
        </div>
      : <p style={{ fontSize: 13, lineHeight: 1.65, color: T.fg, whiteSpace: 'pre-wrap' }}>{note.content}</p>
    }

    {/* 附件 */}
    {note.attachments.length > 0 && <div style={{
      display: 'flex', flexWrap: 'wrap', gap: 6, marginTop: 12, marginBottom: 12,
    }}>
      {note.attachments.map(a => (
        <span key={a.id} style={{
          display: 'inline-flex', alignItems: 'center', gap: 5,
          padding: '5px 10px', borderRadius: 8,
          background: T.soft, fontSize: 11, color: T.muted,
          border: '1px solid ' + T.border,
        }}>
          <AttIcon mime={a.mime} />
          <span style={{ maxWidth: 80, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{a.name}</span>
          <span style={{ opacity: 0.5, fontSize: 10 }}>{fmtSize(a.size)}</span>
        </span>
      ))}
    </div>}

    {/* 底部：状态 + 操作区 */}
    <div style={{
      marginTop: 12, paddingTop: 10,
      borderTop: '1px solid ' + T.border,
    }}>
      {/* 分析状态行 */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 10 }}>
        <span style={{
          display: 'inline-flex', alignItems: 'center', gap: 5,
          fontSize: 10, fontWeight: 500, color: st.color,
          padding: '3px 8px', borderRadius: 5,
          background: st.bg,
        }}>
          {note.status === 'analyzing'
            ? <><span class="pulse-dot" style={{ width: 5, height: 5, borderRadius: '50%', background: st.dot, display: 'inline-block' }} />{st.label}</>
            : <><span style={{ width: 5, height: 5, borderRadius: '50%', background: st.dot, display: 'inline-block' }} />{st.label}</>
          }
        </span>
        <span style={{ fontSize: 10, color: T.muted + '60', fontVariantNumeric: 'tabular-nums' }}>{fmtTime(note.createdAt)}</span>
        {note.status === 'failed' && <span style={{ fontSize: 10, color: T.danger + '80' }}>· {note.lastError}</span>}
        {note.status === 'failed' && <button style={ghostBtn(T, 22)}>{I.refresh}</button>}
      </div>

      {/* 操作按钮组 */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 4, flexWrap: 'wrap' }}>
        {hasReco && <button style={primaryBtn(T)}>{I.wand} 按建议处理</button>}
        <ActionBtn icon={I.journal} label="日记" />
        <ActionBtn icon={I.task} label="任务" />
        <ActionBtn icon={I.milestone} label="里程碑" />
        <ActionBtn icon={I.clip} label="剪藏" />
        {note.attachments.length > 0 && <ActionBtn icon={I.archive} label="附件" />}
        <div style={{ flex: 1 }} />
        <button style={{
          ...ghostBtn(T, 28), color: T.danger + '70', padding: '0 8px', gap: 4,
        }}>{I.trash}<span style={{ fontSize: 10 }}>删除</span></button>
      </div>
    </div>
  </div>;
};

/* ───────── 子组件 ───────── */
const ActionBtn = ({ icon, label, size = 'md' }) => {
  const T = React.useContext(ThemeCtx);
  const isSm = size === 'sm';
  return <button style={{
    height: isSm ? 24 : 28, padding: isSm ? '0 6px' : '0 8px', borderRadius: 5,
    border: '1px solid ' + T.border, background: T.card, color: T.muted + '90',
    cursor: 'pointer', fontSize: isSm ? 10 : 10, fontWeight: 500,
    fontFamily: 'inherit',
    display: 'inline-flex', alignItems: 'center', gap: 3,
    transition: 'all 0.12s',
  }}>{icon}{label}</button>;
};

const primaryBtn = (T) => ({
  height: 28, padding: '0 12px', borderRadius: 6,
  border: 'none', background: T.primary, color: '#fff',
  cursor: 'pointer', fontSize: 10, fontWeight: 600,
  fontFamily: 'inherit',
  display: 'inline-flex', alignItems: 'center', gap: 5,
  transition: 'all 0.12s',
});

const ghostBtn = (T, h) => ({
  height: h, width: h, borderRadius: 6, border: 'none',
  background: 'transparent', color: T.muted + '70', cursor: 'pointer',
  display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
  transition: 'all 0.12s', fontSize: 12,
});

const smPrimary = (T) => ({
  height: 24, padding: '0 8px', borderRadius: 5,
  border: 'none', background: T.primary, color: '#fff',
  cursor: 'pointer', fontSize: 10, fontWeight: 600, fontFamily: 'inherit',
  display: 'inline-flex', alignItems: 'center', gap: 3,
});

const smGhost = (T) => ({
  height: 24, padding: '0 6px', borderRadius: 5, border: 'none',
  background: 'transparent', color: T.muted + '70', cursor: 'pointer',
  display: 'inline-flex', alignItems: 'center', gap: 3,
  fontFamily: 'inherit', fontSize: 10,
  transition: 'all 0.12s',
});

/* ───────── Capture Bar ───────── */
const CaptureBar = () => {
  const T = React.useContext(ThemeCtx);
  const [text, setText] = useState('');
  const [expanded, setExpanded] = useState(false);
  const inputRef = useRef(null);

  const focusInput = () => {
    setExpanded(true);
    setTimeout(() => inputRef.current?.focus(), 100);
  };

  return <div style={{
    position: 'absolute', bottom: 0, left: 0, right: 0,
    background: 'linear-gradient(180deg, transparent 0%, ' + T.bg + ' 25%)',
    padding: '20px 28px 24px',
  }}>
    <div style={{
      maxWidth: 600, margin: '0 auto',
      borderRadius: 14,
      background: T.card,
      border: '1px solid ' + (text || expanded ? T.primary + '40' : T.border),
      boxShadow: '0 4px 20px rgba(0,0,0,0.06)',
      transition: 'all 0.2s',
      overflow: 'hidden',
    }}>
      {/* 输入区 */}
      <div style={{ padding: expanded ? '14px 16px 0' : '10px 14px' }}>
        <textarea
          ref={inputRef}
          value={text}
          onChange={e => { setText(e.target.value); setExpanded(true); }}
          onFocus={() => setExpanded(true)}
          placeholder="捕捉此刻的想法…"
          style={{
            width: '100%', minHeight: expanded ? 60 : 24, maxHeight: 120,
            border: 'none', background: 'transparent',
            fontSize: 13, lineHeight: 1.6, color: T.fg,
            outline: 'none', resize: 'none', fontFamily: 'inherit',
            transition: 'min-height 0.2s',
          }}
        />
      </div>

      {/* 展开后的附件栏 */}
      {expanded && <div style={{ padding: '8px 16px 0', display: 'flex', flexWrap: 'wrap', gap: 6 }}>
        <span style={attChip(T)}>{I.paperclip}<span style={{ fontSize: 11 }}>添加文件</span></span>
        <span style={attChip(T)}>{I.mic}<span style={{ fontSize: 11 }}>录音</span></span>
      </div>}

      {/* 底部栏 */}
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: expanded ? '10px 16px 14px' : '6px 14px',
        transition: 'padding 0.2s',
      }}>
        {!expanded && <span style={{ fontSize: 11, color: T.muted + '50' }}>
          Cmd+Enter 快速保存
        </span>}
        {expanded && <div style={{ display: 'flex', gap: 4 }}>
          <button style={iconBtnStyle(T)}>{I.paperclip}</button>
          <button style={iconBtnStyle(T)}>{I.mic}</button>
        </div>}

        <button style={{
          height: 32, width: 32, borderRadius: 10,
          background: text.trim() ? T.primary : T.muted + '20',
          color: text.trim() ? '#fff' : T.muted + '50',
          border: 'none', cursor: text.trim() ? 'pointer' : 'default',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          transition: 'all 0.15s',
        }}>{I.send}</button>
      </div>
    </div>
  </div>;
};

const attChip = (T) => ({
  display: 'inline-flex', alignItems: 'center', gap: 4,
  padding: '5px 10px', borderRadius: 8,
  border: '1px dashed ' + T.border,
  color: T.muted + '70', fontSize: 12, cursor: 'pointer',
  transition: 'all 0.12s',
});

const iconBtnStyle = (T) => ({
  width: 28, height: 28, borderRadius: 8,
  border: 'none', background: 'transparent',
  color: T.muted + '60', cursor: 'pointer',
  display: 'flex', alignItems: 'center', justifyContent: 'center',
  transition: 'all 0.12s',
});

/* ───────── Render ───────── */
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
<style>{`
@keyframes pulse-dot {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
.pulse-dot {
  animation: pulse-dot 1.2s ease-in-out infinite;
}
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.08); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.15); }
`}</style>
</body>
</html>

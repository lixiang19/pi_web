<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>闪念 · 瀑布流变体探索</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html,body,#root{height:100%}
body{font-family:"Inter Variable",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;-webkit-font-smoothing:antialiased;background:#f8fafc;color:#0f172a}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.07);border-radius:3px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useRef } = React;

const C = { bg:'#f8fafc', fg:'#0f172a', card:'#fff', border:'#e2e8f0', muted:'#64748b', soft:'#f1f5f9', primary:'#4f46e5', pLight:'#eef2ff', danger:'#ef4444', success:'#22c55e', warning:'#f59e0b' };

const I = {
  bulb: <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>,
  send: <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>,
  journal: <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>,
  task: <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>,
  clip: <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/></svg>,
  milestone: <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>,
  trash: <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
  wand: <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M15 4V2m0 2v2m0-2h2m-2 0h-2m-4.5 7.5L21 3"/><path d="M3 21l11-11"/></svg>,
  more: <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>,
  image: <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>,
  audio: <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>,
  paper: <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>,
  refresh: <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>,
  filter: <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>,
};

const fmt = (ts) => { const d=new Date(ts);const n=new Date();const m=Math.floor((n-d)/60000);if(m<1)return'刚刚';if(m<60)return`${m}分钟前`;const h=Math.floor(m/60);if(h<24)return`${h}小时前`;return`${Math.floor(h/24)}天前`; };
const S = { suggested:{label:'已处理',dot:C.primary}, analyzing:{label:'分析中',dot:C.warning}, failed:{label:'失败',dot:C.danger}, unanalyzed:{label:'等待',dot:'#cbd5e1'} };

const NOTES = [
  { id:'1', content:'考虑用 React Server Components 重构列表页，减少客户端 bundle', createdAt:Date.now()-6e4, status:'suggested', reco:'journal', attachments:[] },
  { id:'2', content:'Dashboard 加「今日专注度」趋势热力图', createdAt:Date.now()-3e5, status:'analyzing', attachments:[{name:'sketch.png',mime:'image/png',size:204800}] },
  { id:'3', content:'https://react.dev/blog/2024/12/05/react-19 — React 19 新 API 对项目的影响分析', createdAt:Date.now()-72e5, status:'suggested', reco:'clip', attachments:[] },
  { id:'4', content:'整理会议记录：\n1. 数据库迁移方案\n2. API 认证流程重构', createdAt:Date.now()-864e5, status:'suggested', reco:'task', attachments:[{name:'notes.md',mime:'text/markdown',size:4096},{name:'flow.jpg',mime:'image/jpeg',size:512000}] },
  { id:'5', content:'统一项目中所有错误处理方式，当前 throw / return Result 混用', createdAt:Date.now()-1728e5, status:'failed', attachments:[] },
  { id:'6', content:'类型系统和函数式编程在 TypeScript 中的实践讨论（播客 20min）', createdAt:Date.now()-6048e5, status:'unanalyzed', attachments:[{name:'recording.webm',mime:'audio/webm',size:3145728}] },
];

const AttIcon = ({ mime, size:s=13 }) => {
  if (mime?.startsWith('image/')) return <span style={{color:'#8b5cf6'}}>{I.image}</span>;
  if (mime?.startsWith('audio/')) return <span style={{color:'#ec4899'}}>{I.audio}</span>;
  return <span style={{color:'#3b82f6'}}>{I.paper}</span>;
};

/* ══════════════════════════════════
   V1 · 极简流 — 最小视觉重量
   无边框卡片，hover 出 `···` + 浮动操作条
   ══════════════════════════════════ */
function V1() {
  const [expanded, setExpanded] = useState({});
  const toggle = id => setExpanded(p => ({...p, [id]: !p[id]}));

  return <Layout title="极简流" desc="无边框 · hover 操作">
    {NOTES.map((n,i) => {
      const st = S[n.status];
      const open = !!expanded[n.id];
      return <div key={n.id} style={{display:'flex', gap:12}}>
        {/* 时间线 */}
        <div style={{display:'flex', flexDirection:'column', alignItems:'center', width:14, flexShrink:0}}>
          <div style={{width:8, height:8, borderRadius:'50%', border:'2px solid '+st.dot, background:C.bg, marginTop:14, flexShrink:0}} />
          {i < NOTES.length-1 && <div style={{flex:1, width:1, background:C.border+'80'}} />}
        </div>
        {/* 卡片 — 无边框 */}
        <div style={{flex:1, paddingBottom:6}}>
          <div
            onClick={() => toggle(n.id)}
            style={{
              padding: open ? '12px 0 10px' : '8px 0 10px',
              cursor:'pointer', position:'relative',
              borderBottom:'1px solid '+C.border+'60',
              transition:'all 0.2s',
            }}
          >
            {/* 内容 */}
            <div style={{display:'flex', gap:8, alignItems:'flex-start'}}>
              <span style={{
                flex:1, fontSize:13, lineHeight:1.5, color:C.fg+'e0',
                overflow:'hidden', textOverflow:'ellipsis', whiteSpace: open ? 'normal' : 'nowrap',
              }}>{n.content}</span>
              <span style={{fontSize:10, color:C.muted+'60', flexShrink:0, marginTop:2}}>{fmt(n.createdAt)}</span>
            </div>
            {/* 附件指示 */}
            {!open && n.attachments.length > 0 && <div style={{marginTop:3, display:'flex', gap:4}}>
              {n.attachments.map((a,j) => <span key={j} style={{fontSize:10, color:C.muted+'60'}}><AttIcon mime={a.mime} size={11} /></span>)}
            </div>}
            {/* 展开态 */}
            {open && <>
              <div style={{paddingTop:8, paddingBottom:6, display:'flex', flexWrap:'wrap', gap:6}}>
                {n.attachments.map((a,j) => <span key={j} style={{display:'inline-flex',alignItems:'center',gap:4,padding:'3px 8px',borderRadius:6,background:C.soft,fontSize:10,color:C.muted}}>
                  <AttIcon mime={a.mime} size={11} />{a.name}
                </span>)}
              </div>
              <div style={{display:'flex',gap:8,alignItems:'center',paddingTop:8,borderTop:'1px solid '+C.border+'60'}}>
                {n.status==='suggested' && <ActBtn icon={I.wand} label="按建议处理" primary />}
                <ActBtn icon={I.journal} label="日记" />
                <ActBtn icon={I.task} label="任务" />
                <ActBtn icon={I.clip} label="剪藏" />
                <div style={{flex:1}} />
                <span style={{fontSize:10, color:st.dot}}>● {st.label}</span>
              </div>
            </>}
            {/* hover 操作指示 */}
            <div className="v1-hover" style={{
              position:'absolute', right:0, top:8,
              display:'none', gap:2, background:C.card, padding:'0 4px',
            }}>
              <button style={hBtn(C)} title="处理">{I.wand}</button>
              <button style={hBtn(C)} title="更多">{I.more}</button>
            </div>
          </div>
        </div>
      </div>;
    })}
  </Layout>;
}

/* ══════════════════════════════════
   V2 · 收件箱流 — 邮件风格，批量操作
   左侧 checkbox，底部批量工具栏
   ══════════════════════════════════ */
function V2() {
  const [selected, setSelected] = useState({});
  const [expanded, setExpanded] = useState({});
  const toggle = id => setExpanded(p => ({...p, [id]: !p[id]}));
  const selCount = Object.values(selected).filter(Boolean).length;
  const allSel = selCount === NOTES.length;

  return <Layout title="收件箱流" desc="可批量选择 · 底部操作栏">
    {/* 批量操作栏 */}
    {selCount > 0 && <div style={{
      position:'sticky', top:0, zIndex:10,
      marginBottom:8, padding:'8px 14px', borderRadius:10,
      background:C.primary, color:'#fff',
      display:'flex', alignItems:'center', gap:10,
      fontSize:12, fontWeight:500,
    }}>
      <span>已选 {selCount} 条</span>
      <div style={{display:'flex', gap:6, marginLeft:'auto'}}>
        <BatchBtn label="全部处理" />
        <BatchBtn label="写入日记" />
        <BatchBtn label="删除" danger />
        <button style={{color:'#fff', opacity:0.7, background:'transparent', border:'none', cursor:'pointer', padding:'0 4px', fontSize:12}} onClick={()=>setSelected({})}>取消</button>
      </div>
    </div>}

    {NOTES.map((n,i) => {
      const st = S[n.status];
      const open = !!expanded[n.id];
      return <div key={n.id} style={{display:'flex', gap:10}}>
        {/* 时间线 */}
        <div style={{display:'flex', flexDirection:'column', alignItems:'center', width:16, flexShrink:0}}>
          <label style={{width:16, height:16, borderRadius:'50%', border:'2px solid '+(selected[n.id]?C.primary:st.dot), background:selected[n.id]?C.primary:'transparent', display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', marginTop:13, fontSize:10, color:'#fff'}}>
            <input type="checkbox" checked={!!selected[n.id]} onChange={()=>setSelected(p=>({...p,[n.id]:!p[n.id]}))} style={{display:'none'}} />
            {selected[n.id] ? '✓' : ''}
          </label>
          {i < NOTES.length-1 && <div style={{flex:1, width:1, background:C.border+'80'}} />}
        </div>
        {/* 卡片 */}
        <div style={{flex:1, paddingBottom:4}}>
          <div onClick={()=>toggle(n.id)} style={{
            borderRadius:10, padding:open?'12px 14px 10px':'10px 14px',
            background:C.card, border:'1px solid '+(selected[n.id]?C.primary+'40':C.border),
            boxShadow:'0 1px 2px rgba(0,0,0,0.03)', cursor:'pointer',
            transition:'all 0.15s', marginBottom:6,
          }}>
            <div style={{display:'flex', gap:10}}>
              <span style={{flex:1,fontSize:13,lineHeight:1.5,color:C.fg,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:open?'normal':'nowrap'}}>{n.content}</span>
              <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:4,flexShrink:0}}>
                <span style={{fontSize:10,color:C.muted+'60'}}>{fmt(n.createdAt)}</span>
                <span style={{display:'inline-flex',alignItems:'center',gap:3,fontSize:10,color:st.dot}}>
                  <span style={{width:5,height:5,borderRadius:'50%',background:st.dot}} />
                  {n.attachments.length > 0 && <span style={{color:C.muted+'60',fontSize:10}}>{n.attachments.length} 附件</span>}
                </span>
              </div>
            </div>
            {open && <>
              <div style={{display:'flex',flexWrap:'wrap',gap:6,marginTop:10,marginBottom:8}}>
                {n.attachments.map((a,j) => <span key={j} style={{display:'inline-flex',alignItems:'center',gap:4,padding:'4px 10px',borderRadius:6,background:C.soft,border:'1px solid '+C.border,fontSize:10,color:C.muted}}>
                  <AttIcon mime={a.mime} size={11} />{a.name}
                </span>)}
              </div>
              <div style={{display:'flex',gap:4,paddingTop:8,borderTop:'1px solid '+C.border}}>
                {n.status==='suggested' && <ActBtn icon={I.wand} label="按建议" primary />}
                <ActBtn icon={I.journal} label="日记" />
                <ActBtn icon={I.task} label="任务" />
                <ActBtn icon={I.clip} label="剪藏" />
                <div style={{flex:1}} />
                <button style={{height:26,width:26,borderRadius:6,border:'none',background:'transparent',color:C.danger+'70',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>{I.trash}</button>
              </div>
            </>}
          </div>
        </div>
      </div>;
    })}
  </Layout>;
}

const BatchBtn = ({label, danger}) => (
  <button style={{
    padding:'4px 10px', borderRadius:6, border:'1px solid '+(danger?'rgba(255,255,255,0.3)':'rgba(255,255,255,0.2)'),
    background:'transparent', color: danger ? C.danger : '#fff', cursor:'pointer',
    fontSize:11, fontWeight:500, fontFamily:'inherit', opacity:0.9,
  }}>{label}</button>
);

/* ══════════════════════════════════
   V3 · 仪表盘流 — 信息丰富，状态显眼
   左侧色条，badge 状态，建议卡片，缩略图
   ══════════════════════════════════ */
function V3() {
  const [expanded, setExpanded] = useState({});
  const toggle = id => setExpanded(p => ({...p, [id]: !p[id]}));

  return <Layout title="仪表盘流" desc="色条状态 · 建议突出 · 附件可视化">
    {NOTES.map((n,i) => {
      const st = S[n.status];
      const open = !!expanded[n.id];
      const isFirst = i === 0;
      return <div key={n.id} style={{display:'flex',gap:14}}>
        {/* 时间线 */}
        <div style={{display:'flex',flexDirection:'column',alignItems:'center',width:14,flexShrink:0}}>
          {isFirst && <div style={{width:1,flex:1,background:'transparent'}} />}
          <div style={{
            width: open ? 14 : 10, height: open ? 14 : 10, borderRadius:'50%',
            background: st.dot, border: '2px solid '+C.bg,
            boxShadow: '0 0 0 2px '+st.dot,
            transition:'all 0.2s', flexShrink:0,
          }} />
          {i < NOTES.length-1 && <div style={{flex:1,width:1,background:C.border+'60',marginTop:4}} />}
        </div>
        {/* 卡片 — 左侧色条 */}
        <div style={{flex:1, paddingBottom:10}}>
          <div
            onClick={() => toggle(n.id)}
            style={{
              borderRadius:12, padding: open ? '14px 18px 12px' : '10px 18px',
              background:C.card,
              borderLeft: '4px solid ' + st.dot,
              boxShadow: open ? '0 2px 12px rgba(0,0,0,0.06)' : '0 1px 4px rgba(0,0,0,0.03)',
              cursor:'pointer', transition:'all 0.2s',
              position:'relative', overflow:'hidden',
            }}
          >
            {/* 状态 badge */}
            <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:8}}>
              <span style={{
                display:'inline-flex',alignItems:'center',gap:4,
                padding:'2px 8px', borderRadius:4,
                background: st.dot + '15', color: st.dot,
                fontSize:10, fontWeight:600,
              }}>{st.label}</span>
              <span style={{fontSize:10,color:C.muted+'60'}}>{fmt(n.createdAt)}</span>
              {n.attachments.length > 0 && <span style={{fontSize:10,color:C.muted+'60', marginLeft:'auto'}}>
                {n.attachments.length} 个附件
              </span>}
            </div>
            {/* 内容 */}
            <p style={{fontSize:13,lineHeight:1.6,color:C.fg,whiteSpace:'pre-wrap',display:open?'block':'-webkit-box',WebkitLineClamp:open?'none':2,WebkitBoxOrient:'vertical',overflow:'hidden'}}>
              {n.content}
            </p>
            {/* 附件缩略图（展开态或图片） */}
            {!open && n.attachments.length > 0 && <div style={{marginTop:6,display:'flex',gap:4}}>
              {n.attachments.map((a,j) => <span key={j} style={{fontSize:10,color:C.muted+'60',display:'inline-flex',alignItems:'center',gap:3}}>
                <AttIcon mime={a.mime} size={10} />
              </span>)}
            </div>}
            {/* 展开：附件 + 建议 + 操作 */}
            {open && <>
              {n.attachments.length > 0 && <div style={{display:'flex',flexWrap:'wrap',gap:8,marginTop:10,marginBottom:10}}>
                {n.attachments.map((a,j) => {
                  const isImg = a.mime?.startsWith('image/');
                  return <span key={j} style={{
                    display:'inline-flex',alignItems:'center',gap:5,
                    padding:'5px 10px', borderRadius:8,
                    background:C.soft, border:'1px solid '+C.border,
                    fontSize:11, color:C.muted,
                  }}>
                    {isImg ? <span style={{width:20,height:20,borderRadius:4,background:'#ddd',display:'inline-flex',alignItems:'center',justifyContent:'center',fontSize:8,color:C.muted+'60'}}>🖼</span> : <AttIcon mime={a.mime} size={13} />}
                    <span style={{maxWidth:70,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{a.name}</span>
                  </span>;
                })}
              </div>}

              {/* AI 建议卡片 */}
              {n.status === 'suggested' && <div style={{
                marginBottom:10, padding:'8px 12px', borderRadius:8,
                background:C.pLight, border:'1px solid '+C.primary+'30',
                display:'flex', alignItems:'center', gap:8,
              }}>
                <span style={{color:C.primary}}>{I.wand}</span>
                <span style={{fontSize:11,color:C.primary,flex:1}}>
                  AI 建议转为 <strong>{n.reco === 'journal' ? '日记' : n.reco === 'task' ? '任务' : '剪藏'}</strong>
                </span>
                <button style={{height:26,padding:'0 12px',borderRadius:6,border:'none',background:C.primary,color:'#fff',fontSize:10,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>处理</button>
              </div>}

              {/* 操作 */}
              <div style={{display:'flex',gap:4,paddingTop:8,borderTop:'1px solid '+C.border+'80'}}>
                <ActBtn icon={I.journal} label="日记" />
                <ActBtn icon={I.task} label="任务" />
                <ActBtn icon={I.milestone} label="里程碑" />
                <ActBtn icon={I.clip} label="剪藏" />
                {n.status==='failed' && <button style={gh(C)}>{I.refresh}</button>}
                <div style={{flex:1}} />
                <button style={{...gh(C),color:C.danger+'70'}}>{I.trash}</button>
              </div>
            </>}
          </div>
        </div>
      </div>;
    })}
  </Layout>;
}

/* ───────── 通用组件 ───────── */
function Layout({title, desc, children}) {
  const [filter, setFilter] = useState('all');
  const [text, setText] = useState('');

  return <div style={{height:'100vh',display:'flex',flexDirection:'column',maxWidth:680,margin:'0 auto',padding:'0 24px'}}>
    {/* Header */}
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'18px 0 14px',borderBottom:'1px solid '+C.border}}>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <div style={{width:30,height:30,borderRadius:9,background:C.primary+'14',color:C.primary,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>{I.bulb}</div>
        <div>
          <span style={{fontSize:14,fontWeight:600}}>闪念</span>
          <span style={{fontSize:10,color:C.muted+'80',marginLeft:6}}>{title}</span>
        </div>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:6,fontSize:11,color:C.muted}}>
        <span>{NOTES.length} 条</span>
      </div>
    </div>

    {/* Filter */}
    <div style={{display:'flex',gap:4,padding:'8px 0 10px',borderBottom:'1px solid '+C.border+'60'}}>
      {[{k:'all',l:'全部'},{k:'processed',l:'已处理'},{k:'unprocessed',l:'未处理'}].map(f => (
        <button key={f.k} onClick={()=>setFilter(f.k)} style={{
          padding:'4px 10px',borderRadius:6,border:'none',
          background: filter===f.k ? C.primary : 'transparent',
          color: filter===f.k ? '#fff' : C.muted,
          fontSize:11,fontWeight:500,cursor:'pointer',fontFamily:'inherit',
        }}>{f.l}</button>
      ))}
      <div style={{flex:1}} />
      <span style={{fontSize:10,color:C.muted+'50',alignSelf:'center'}}>点击展开 · hover 操作</span>
    </div>

    {/* List */}
    <div style={{flex:1,overflowY:'auto',paddingTop:6,paddingBottom:100}}>
      {children}
    </div>

    {/* Capture */}
    <div style={{position:'absolute',bottom:0,left:0,right:0,padding:'16px 24px 20px',background:'linear-gradient(180deg,transparent 0%,'+C.bg+' 30%)',pointerEvents:'none'}}>
      <div style={{display:'flex',gap:8,alignItems:'center',maxWidth:680,margin:'0 auto',pointerEvents:'auto'}}>
        <input value={text} onChange={e=>setText(e.target.value)} placeholder="捕捉想法…"
          style={{flex:1,height:38,padding:'0 14px',borderRadius:10,border:'1.5px solid '+C.border,background:C.card,fontSize:12,outline:'none',fontFamily:'inherit'}}
        />
        <button style={{height:38,width:38,borderRadius:10,border:'none',background:text.trim()?C.primary:C.muted+'20',color:text.trim()?'#fff':C.muted+'50',cursor:text.trim()?'pointer':'default',display:'flex',alignItems:'center',justifyContent:'center'}}>{I.send}</button>
      </div>
    </div>
  </div>;
}

const ActBtn = ({icon,label,primary}) => {
  const T = C;
  return <button style={{
    height:26, padding:'0 8px', borderRadius:6,
    border: primary ? 'none' : '1px solid '+T.border,
    background: primary ? T.primary : T.card,
    color: primary ? '#fff' : T.muted+'90',
    cursor:'pointer', fontSize:10, fontWeight: primary ? 600 : 500,
    fontFamily:'inherit',
    display:'inline-flex', alignItems:'center', gap:3,
    transition:'all 0.1s',
  }}>{icon}{label}</button>;
};

const hBtn = (T) => ({
  width:24, height:24, borderRadius:6, border:'none',
  background:'transparent', color:T.muted+'70', cursor:'pointer',
  display:'flex', alignItems:'center', justifyContent:'center',
  fontSize:12,
});

const gh = (T) => ({
  height:26, width:26, borderRadius:6, border:'none',
  background:'transparent', color:T.muted+'70', cursor:'pointer',
  display:'flex', alignItems:'center', justifyContent:'center',
});

/* ══════════════════════════════════
   主结构
   ══════════════════════════════════ */
const TABS = [
  {key:'V1',label:'V1 · 极简流',desc:'无边框 · 内容即界面'},
  {key:'V2',label:'V2 · 收件箱',desc:'批量选择 · 邮件风格'},
  {key:'V3',label:'V3 · 仪表盘',desc:'色条状态 · 建议突出'},
];

function App() {
  const [tab, setTab] = useState('V1');
  const Comp = tab === 'V1' ? V1 : tab === 'V2' ? V2 : V3;
  return <div style={{height:'100vh',display:'flex',flexDirection:'column'}}>
    <div style={{display:'flex',justifyContent:'center',gap:2,padding:'12px 16px 0',borderBottom:'1px solid '+C.border,background:C.bg}}>
      {TABS.map(t => {
        const a = tab === t.key;
        return <button key={t.key} onClick={()=>setTab(t.key)} style={{
          padding:'8px 18px 10px', border:'none', borderBottom:'2px solid '+(a?C.primary:'transparent'),
          background:'transparent', cursor:'pointer', fontFamily:'inherit',
        }}>
          <span style={{fontSize:13,fontWeight:500,color:a?C.primary:C.muted}}>{t.label}</span>
          <span style={{fontSize:10,color:C.muted+'99',marginTop:1,display:'block'}}>{t.desc}</span>
        </button>;
      })}
    </div>
    <div style={{flex:1,overflow:'hidden',position:'relative'}}><Comp /></div>
  </div>;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
